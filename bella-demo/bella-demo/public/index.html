<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bella Aesthetic Clinic — WhatsApp Chat (Live Demo)</title>
<meta name="description" content="Live demo of REZLSG's WhatsApp AI agent. Try it out.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --wa-bg: #0B141A;
    --wa-header: #1F2C34;
    --wa-chat-bg: #0B141A;
    --wa-msg-out: #005C4B;
    --wa-msg-in: #1F2C34;
    --wa-text: #E9EDEF;
    --wa-text-muted: #8696A0;
    --wa-green: #25D366;
    --wa-input: #1F2C34;
    --rezlsg-orange: #FF4D1C;
  }

  html, body {
    height: 100%;
    background: #0B141A;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--wa-text);
    overflow: hidden;
  }

  /* Outer container — looks like a phone frame on desktop, fullscreen on mobile */
  .phone-frame {
    max-width: 440px;
    margin: 0 auto;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--wa-chat-bg);
    box-shadow: 0 0 80px rgba(0,0,0,0.5);
    position: relative;
  }

  /* Subtle WhatsApp wallpaper pattern */
  .phone-frame::before {
    content: '';
    position: absolute;
    inset: 60px 0 80px 0;
    background-image:
      radial-gradient(circle at 25% 30%, rgba(255,255,255,0.015) 0%, transparent 50%),
      radial-gradient(circle at 75% 80%, rgba(255,255,255,0.015) 0%, transparent 50%);
    pointer-events: none;
  }

  /* === HEADER === */
  .wa-header {
    background: var(--wa-header);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    flex-shrink: 0;
    z-index: 2;
  }

  .wa-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--rezlsg-orange), #FF8159);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 600;
    font-size: 18px;
    font-family: Georgia, serif;
    flex-shrink: 0;
  }

  .wa-name-block {
    flex: 1;
    min-width: 0;
  }
  .wa-name {
    font-size: 16px;
    font-weight: 500;
    color: white;
  }
  .wa-status {
    font-size: 12px;
    color: var(--wa-text-muted);
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .wa-status .dot {
    width: 8px;
    height: 8px;
    background: var(--wa-green);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(37,211,102,0.5);
  }

  .demo-badge {
    background: var(--rezlsg-orange);
    color: white;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 3px 8px;
    border-radius: 999px;
    font-weight: 600;
    margin-left: auto;
  }

  /* === MESSAGES === */
  .wa-messages {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    z-index: 1;
  }
  .wa-messages::-webkit-scrollbar { width: 0; }

  .wa-msg {
    max-width: 78%;
    padding: 7px 10px 8px 12px;
    border-radius: 8px;
    font-size: 14.5px;
    line-height: 1.4;
    word-wrap: break-word;
    position: relative;
    animation: msgIn 0.25s ease;
    white-space: pre-wrap;
  }
  .wa-msg.in {
    background: var(--wa-msg-in);
    color: var(--wa-text);
    align-self: flex-start;
    border-top-left-radius: 0;
  }
  .wa-msg.out {
    background: var(--wa-msg-out);
    color: white;
    align-self: flex-end;
    border-top-right-radius: 0;
  }
  .wa-msg-time {
    font-size: 10.5px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
    text-align: right;
    user-select: none;
  }
  .wa-msg.in .wa-msg-time { color: var(--wa-text-muted); }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Typing indicator */
  .typing {
    align-self: flex-start;
    background: var(--wa-msg-in);
    padding: 12px 14px;
    border-radius: 8px;
    border-top-left-radius: 0;
    display: flex;
    gap: 4px;
  }
  .typing span {
    width: 7px;
    height: 7px;
    background: var(--wa-text-muted);
    border-radius: 50%;
    animation: typingBlink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBlink {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-3px); }
  }

  /* Day divider */
  .wa-day {
    align-self: center;
    background: rgba(31,44,52,0.85);
    color: var(--wa-text-muted);
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 8px;
    margin: 8px 0;
    backdrop-filter: blur(8px);
  }

  /* Escalation banner */
  .escalation {
    align-self: center;
    background: rgba(255,77,28,0.12);
    border: 1px solid rgba(255,77,28,0.3);
    color: #FFB39A;
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 12px;
    margin: 8px 0;
    text-align: center;
    max-width: 80%;
    line-height: 1.4;
  }

  /* === INPUT === */
  .wa-input-bar {
    background: var(--wa-header);
    padding: 8px 10px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    flex-shrink: 0;
    z-index: 2;
  }

  .wa-input-wrap {
    flex: 1;
    background: var(--wa-input);
    border-radius: 22px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
  }

  .wa-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--wa-text);
    font-size: 15px;
    font-family: inherit;
    resize: none;
    max-height: 100px;
    line-height: 1.4;
  }
  .wa-input::placeholder { color: var(--wa-text-muted); }

  .wa-send {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--wa-green);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.2s;
  }
  .wa-send:hover:not(:disabled) { transform: scale(1.05); }
  .wa-send:disabled { opacity: 0.4; cursor: not-allowed; }
  .wa-send svg { width: 22px; height: 22px; fill: white; }

  /* === FOOTER (REZLSG attribution + reset) === */
  .demo-footer {
    background: #06090C;
    color: var(--wa-text-muted);
    font-size: 11px;
    padding: 8px 16px;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .demo-footer a {
    color: var(--rezlsg-orange);
    text-decoration: none;
    font-weight: 500;
  }
  .demo-footer button {
    background: none;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--wa-text-muted);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
  }
  .demo-footer button:hover { color: white; border-color: rgba(255,255,255,0.35); }
</style>
</head>
<body>

<div class="phone-frame">

  <!-- Header -->
  <div class="wa-header">
    <div class="wa-avatar">B</div>
    <div class="wa-name-block">
      <div class="wa-name">Bella Aesthetic Clinic</div>
      <div class="wa-status">
        <span class="dot"></span>
        <span id="statusText">online · typically replies instantly</span>
      </div>
    </div>
    <span class="demo-badge">Demo</span>
  </div>

  <!-- Messages -->
  <div class="wa-messages" id="messages">
    <div class="wa-day">Today</div>
  </div>

  <!-- Input -->
  <div class="wa-input-bar">
    <div class="wa-input-wrap">
      <textarea
        class="wa-input"
        id="input"
        placeholder="Type a message"
        rows="1"
        autocomplete="off"
        autofocus></textarea>
    </div>
    <button class="wa-send" id="sendBtn" aria-label="Send" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <!-- Demo footer -->
  <div class="demo-footer">
    <span>Built by <a href="https://rezlsg.agency" target="_blank">rezl.sg</a> · This is a live AI agent</span>
    <button id="resetBtn">Reset</button>
  </div>

</div>

<script>
  // ===== CONFIG =====
  // The API endpoint. When deployed on Vercel, /api/chat works.
  // For local testing against a deployed backend, replace with full URL.
  const API_URL = '/api/chat';

  // ===== STATE =====
  let conversation = []; // [{role: 'user'|'assistant', content: string}]
  let isSending = false;
  let conversationClosed = false;

  // ===== DOM =====
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const resetBtn = document.getElementById('resetBtn');
  const statusText = document.getElementById('statusText');

  // ===== UTILITIES =====
  function nowTime() {
    const d = new Date();
    const h = d.getHours();
    const m = d.getMinutes().toString().padStart(2, '0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = ((h + 11) % 12) + 1;
    return `${h12}:${m} ${ampm}`;
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function renderMessage(role, content, time) {
    const div = document.createElement('div');
    div.className = 'wa-msg ' + (role === 'user' ? 'out' : 'in');
    const text = document.createElement('div');
    text.textContent = content;
    const t = document.createElement('div');
    t.className = 'wa-msg-time';
    t.textContent = time || nowTime();
    div.appendChild(text);
    div.appendChild(t);
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function renderEscalation() {
    const div = document.createElement('div');
    div.className = 'escalation';
    div.textContent = '🟠 A human consultant has been notified — they\u2019ll follow up with you shortly.';
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function showTyping() {
    const t = document.createElement('div');
    t.className = 'typing';
    t.id = 'typingIndicator';
    t.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(t);
    scrollToBottom();
    statusText.textContent = 'typing...';
  }

  function hideTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
    statusText.textContent = 'online · typically replies instantly';
  }

  function updateSendButton() {
    sendBtn.disabled = !inputEl.value.trim() || isSending || conversationClosed;
  }

  // Save / load conversation from sessionStorage (survives page reloads in same tab)
  function saveConversation() {
    try {
      sessionStorage.setItem('bella_chat', JSON.stringify(conversation));
    } catch (e) { /* ignore */ }
  }

  function loadConversation() {
    try {
      const saved = sessionStorage.getItem('bella_chat');
      if (!saved) return false;
      const parsed = JSON.parse(saved);
      if (!Array.isArray(parsed) || parsed.length === 0) return false;
      conversation = parsed;
      // Render history
      for (const msg of parsed) {
        renderMessage(msg.role === 'user' ? 'user' : 'assistant', msg.content, msg.time);
      }
      return true;
    } catch (e) {
      return false;
    }
  }

  // ===== CORE: send message =====
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isSending || conversationClosed) return;

    // Render user message
    conversation.push({ role: 'user', content: text, time: nowTime() });
    renderMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    saveConversation();

    isSending = true;
    updateSendButton();
    showTyping();

    // Realistic typing delay (200-700ms) before showing the indicator's full effect
    const minDelay = 600 + Math.random() * 600;
    const startTime = Date.now();

    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: conversation.map(m => ({ role: m.role, content: m.content })),
        }),
      });

      // Force minimum typing time so it feels natural
      const elapsed = Date.now() - startTime;
      if (elapsed < minDelay) {
        await new Promise(r => setTimeout(r, minDelay - elapsed));
      }

      hideTyping();

      if (!response.ok) {
        // 4xx / 5xx
        renderMessage('assistant', "Sorry, I had a small hiccup. A consultant will follow up with you shortly. 💛");
        renderEscalation();
        conversationClosed = true;
        return;
      }

      const data = await response.json();
      const reply = data.reply || "Sorry, something went wrong. Let me get a consultant to follow up.";

      conversation.push({ role: 'assistant', content: reply, time: nowTime() });
      renderMessage('assistant', reply);
      saveConversation();

      if (data.escalate) {
        renderEscalation();
        conversationClosed = true;
      }

    } catch (err) {
      hideTyping();
      console.error(err);
      renderMessage('assistant', "Sorry, I can't seem to connect right now. A consultant will follow up shortly. 💛");
      renderEscalation();
      conversationClosed = true;
    } finally {
      isSending = false;
      updateSendButton();
      inputEl.focus();
    }
  }

  // ===== EVENT HANDLERS =====
  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('input', () => {
    updateSendButton();
    // Auto-grow textarea
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  resetBtn.addEventListener('click', () => {
    if (!confirm('Reset the conversation?')) return;
    conversation = [];
    conversationClosed = false;
    sessionStorage.removeItem('bella_chat');
    messagesEl.innerHTML = '<div class="wa-day">Today</div>';
    showGreeting();
    updateSendButton();
  });

  // ===== INITIALIZE =====
  function showGreeting() {
    // Static opening message — feels natural, doesn't burn API credits
    setTimeout(() => {
      const greeting = "Hi! 💛 Welcome to Bella Aesthetic Clinic. I'm here to help with treatment info, pricing, or booking a consultation. What can I help you with?";
      conversation.push({ role: 'assistant', content: greeting, time: nowTime() });
      renderMessage('assistant', greeting);
      saveConversation();
    }, 400);
  }

  // On load: try to restore conversation, else show greeting
  window.addEventListener('DOMContentLoaded', () => {
    const restored = loadConversation();
    if (!restored) showGreeting();
    inputEl.focus();
  });

</script>

</body>
</html>
